server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # English — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mongolian locale — SPA fallback
    location /mn/ {
        try_files $uri $uri/ /mn/index.html;
    }

    # Hashed assets — cache forever
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files — short cache
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Fonts, images, SVG
    location ~* \.(svg|png|ico|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;
}